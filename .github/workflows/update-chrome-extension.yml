name: Update Chrome Extension

on:
  push:
    branches:
      - main

jobs:
  update_job:
    name: update_job
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout code from repository
      - name: Checkout repository
        uses: actions/checkout@v4
      # 2. Package the extension as a zip file
      - name: Package extension
        run: |
          zip -r extension.zip ./build
      # 3. Upload extension to Chrome Web Store (using chrome-webstore-upload-cli)
      - name: Upload extension to Chrome Web Store
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: |
          npm install -g chrome-webstore-upload-cli
          chrome-webstore-upload-cli --client-id $CLIENT_ID --client-secret $CLIENT_SECRET --refresh-token $REFRESH_TOKEN --extension-id lnhbphijmndicpcgdpjeelcpefcmmpkg --zip ./extension.zip
